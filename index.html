        let port = null;

        function log(msg) {

            let box =
                document.getElementById("log");


            box.textContent += msg + "\n";

            box.scrollTop =
                box.scrollHeight;

        }





        function sleep(ms) {

            return new Promise(
                resolve => setTimeout(resolve, ms)
            );

        }







        async function connectHub() {


            try {


                port =
                    await navigator.serial.requestPort();



                await port.open({

                    baudRate: 115200

                });



                writer =
                    port.writable.getWriter();



                log(
                    "Connected"
                );

                await sendRaw(
                    new Uint8Array([3])
                );
                await sleep(500);
                startReader();

            }

            catch (e) {

                log(
                    "ERROR: " + e
                );

            }


        }








        async function startReader() {


            const reader =
                port.readable.getReader();



            while (true) {


                try {


                    const {
                        value,
                        done
                    }
                        =
                        await reader.read();



                    if (done)
                        break;



                    if (value) {

                        log(
                            new TextDecoder()
                                .decode(value)
                        );

                    }


                }

                catch (e) {

                    break;

                }


            }


        }








        async function sendRaw(data) {


            if (!writer) {

                log(
                    "Not connected"
                );

                return;

            }



            await writer.write(data);

        }









        //
        // Normal command
        // Sends CTRL+C first
        //

        async function send(command, delay = 0.2) {


            log(
                ">>> " + command
            );



            await sendRaw(

                new TextEncoder()
                    .encode(
                        command + "\r\n"
                    )

            );



            await sleep(
                delay * 500
            );


        }





        function escapeString(text) {

            return text
                .replaceAll("\\", "\\\\")
                .replaceAll('"', '\\"')
                .replaceAll("\n", "\\n");
        }

class BLEUART:
    _UART_UUID = bluetooth.UUID("6E400001-B5A3-F393-E0A9-E50E24DCCA9E")
    _RX_UUID = bluetooth.UUID("6E400002-B5A3-F393-E0A9-E50E24DCCA9E")
    _TX_UUID = bluetooth.UUID("6E400003-B5A3-F393-E0A9-E50E24DCCA9E")

    def __init__(self, name="SPIKE Hub"):
        self._ble = bluetooth.BLE()
        self._ble.active(True)
        self._ble.irq(self._irq)

        self._service = (
            self._UART_UUID,
            (
                (self._RX_UUID, bluetooth.FLAG_WRITE | bluetooth.FLAG_WRITE_NO_RESPONSE),
                (self._TX_UUID, bluetooth.FLAG_READ | bluetooth.FLAG_NOTIFY),
            ),
        )
        ((self._rx_handle, self._tx_handle),) = self._ble.gatts_register_services((self._service,))

        self._conn_handle = None
        self._rx_buffer = bytearray()
        self._write_callback = None

        self._advertise(name)

    def _irq(self, event, data):
        if event == 1:
            conn_handle, _, _ = data
            self._conn_handle = conn_handle
            print("BLE Connected")
        elif event == 2:
            self._conn_handle = None
            print("BLE Disconnected")
            self._advertise()
        elif event == 3:
            conn_handle, value_handle = data
            if conn_handle == self._conn_handle and value_handle == self._rx_handle:
                incoming = self._ble.gatts_read(self._rx_handle)
                print("BLE RX raw:", incoming, "| callback armed:", self._write_callback is not None)
                self._rx_buffer.extend(incoming)
                if self._write_callback:
                    try:
                        self._write_callback()
                    except Exception as e:
                        import traceback
                        print("write_callback ERROR:", e)
                        traceback.print_exc()

    def _advertise(self, name="SPIKE"):
        payload = bytearray(b"\x02\x01\x06")
        payload.append(len(name) + 1)
        payload.append(0x09)
        payload.extend(name.encode())
        self._ble.gap_advertise(100000, payload)

    def any(self):
        return len(self._rx_buffer) > 0

    def read_line(self):
        idx_n = self._rx_buffer.find(b"\n")
        idx_r = self._rx_buffer.find(b"\r")
        
        if idx_n == -1 and idx_r == -1:
            return None
        
        if idx_n == -1:
            idx = idx_r
        elif idx_r == -1:
            idx = idx_n
        else:
            idx = min(idx_n, idx_r)
        
        line = bytes(self._rx_buffer[:idx])
        self._rx_buffer = self._rx_buffer[idx + 1:]
        
        try:
            return line.decode().strip()
        except UnicodeError:
            return None

    def take_all(self):
        if len(self._rx_buffer) == 0:
            print(">>> buffer is empty in take_all")
            return None
        
        raw = bytes(self._rx_buffer)
        self._rx_buffer = bytearray()
        print(">>> take_all got bytes:", repr(raw))
        try:
            decoded = raw.decode().strip()
            print(">>> take_all decoded to:", repr(decoded))
            return decoded
        except Exception as e:
            print(">>> take_all decode failed:", type(e).__name__, e)
            return None

    def write(self, data):
        if self._conn_handle is not None:
            try:
                self._ble.gatts_write(self._tx_handle, data.encode())
                self._ble.gatts_notify(self._conn_handle, self._tx_handle)
            except Exception as e:
                print("BLE write failed:", e)

def cmd_run(args):
    p = get_port(args[0])
    speed = int(args[1])
    motor.run(p, speed)

async def cmd_rotate(args):
    p = get_port(args[0])
    degrees = int(args[1])
    speed = int(args[2])
    await motor.run_for_degrees(p, degrees, speed)

async def cmd_one(args):
    p = get_port(args[0])
    speed = int(args[1])
    degrees = int(args[2])
    await motor.run_for_degrees(p, degrees, speed)

async def cmd_both(args):
    p1 = get_port(args[0])
    p2 = get_port(args[1])
    speed = int(args[2])
    degrees = int(args[3])
    motor.run_for_degrees(p1, degrees, speed)
    await motor.run_for_degrees(p2, degrees, speed)

async def cmd_goto(args):
    p = get_port(args[0])
    speed = int(args[1])
    angle = int(args[2])
    await motor.run_to_position(p, angle, speed)

def cmd_stop(args):
    motor.stop(get_port(args[0]))

def cmd_reset(args):
    motor.reset_relative_position(get_port(args[0]), 0)

def cmd_pos(args):
    reply(motor.relative_position(get_port(args[0])))

def cmd_speed(args):
    reply(motor.velocity(get_port(args[0])))


def cmd_get_name(args):

def cmd_get_battery(args):

        percent = battery.capacity_left()
        reply("{:.0f}%".format(percent))

        reply("ERR " + str(e))
